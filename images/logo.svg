<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="heart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Heart shape -->
  <path d="M32 50
           C32 50 10 37 10 24
           C10 17 15 12 21 12
           C25 12 29 14.5 32 18
           C35 14.5 39 12 43 12
           C49 12 54 17 54 24
           C54 37 32 50 32 50 Z"
        fill="url(#heart)"/>

  <!-- Checkmark inside heart -->
  <path d="M20 31 L28 40 L46 22"
        fill="none" stroke="#DC2626" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkles -->
  <circle cx="12" cy="14" r="2" fill="#FCD34D"/>
  <circle cx="52" cy="12" r="1.5" fill="#FCD34D"/>
  <circle cx="8" cy="30" r="1.5" fill="#FCD34D" opacity="0.7"/>
</svg>
